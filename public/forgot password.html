<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Recovery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #B5C8FF;
    }
    .navbar-custom {
      background-color: #7A9CFF;
    }
    .navbar-custom .nav-link, .navbar-custom .navbar-brand {
      color: white;
    }
    .container-custom {
      background-color: white;
      border-radius: 25px;
      padding: 2rem;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25) inset;
      border: 1px solid black;
    }
    .title {
      font-family: 'Krona One', sans-serif;
      font-size: 40px;
    }
    .subtitle {
      font-family: 'Krona One', sans-serif;
      font-size: 20px;
      color: black;
    }
    .input-box {
      background-color: #D9D9D9;
      border-radius: 25px;
      height: 52px;
    }
    .confirm-btn {
      background-color: #84A3FF;
      color: white;
      border-radius: 25px;
      font-size: 24px;
      font-family: 'Krona One', sans-serif;
    }
    .code-input {
      width: 48px;
      height: 48px;
      background-color: white;
      border: 2px solid black;
      text-align: center;
    }
    .brand-title {
      font-size: 37px;
      font-family: 'Abhaya Libre', serif;
      font-weight: 800;
      color: white;
      letter-spacing: 1.85px;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand brand-title" href="#">IELTS MASTERY</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="#">Home</a>
      <a class="nav-link" href="#">Exam Library</a>
      <a class="nav-link" href="#">Forum</a>
      <a class="nav-link" href="#">Tips</a>
      <a class="nav-link" href="#">Skills</a>
      <a class="nav-link" href="#">Vocabulary</a>
      <a class="nav-link" href="#">Book a test</a>
    </div>
    <a class="nav-link" href="#">Login</a>
    <a class="nav-link" href="#">Register</a>
  </div>
</nav>

<div class="d-flex justify-content-center align-items-center vh-100">
  <div class="container-custom">
    <h2 class="text-center title">Forgot your password?</h2>
    <p class="text-center subtitle mt-4">Enter your email/phone number</p>
    <div class="input-box mx-auto mt-3 p-2"></div>

    <p class="text-center subtitle mt-5">Enter the code sent to your mail/phone</p>
    <div class="d-flex justify-content-center gap-2 mt-3">
      <input type="text" class="code-input" maxlength="1">
      <input type="text" class="code-input" maxlength="1">
      <input type="text" class="code-input" maxlength="1">
      <input type="text" class="code-input" maxlength="1">
      <input type="text" class="code-input" maxlength="1">
      <input type="text" class="code-input" maxlength="1">
    </div>

    <div class="text-center mt-5">
      <button class="btn confirm-btn px-4">Next</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
