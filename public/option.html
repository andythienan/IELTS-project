<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reconstructed Page with Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .option {
      width: 100%;
      height: 1024px;
      background: #B5C8FF;
      box-shadow: inset 0px 4px 4px rgba(0, 0, 0, 0.25);
      border: 1px solid black;
      position: relative;
    }
    .container-box {
      background: white;
      border-radius: 25px;
      padding: 20px;
    }
    .btn-custom {
      border-radius: 25px;
      color: white;
      font-size: 24px;
      font-family: 'Krona One', sans-serif;
      font-weight: 400;
    }
    .header-bar {
      background: #7A9CFF;
      color: white;
    }
    .divider {
      border-left: 1px solid white;
      height: 100%;
      margin: 0 15px;
    }
  </style>
</head>
<body>

<div class="option">
  <!-- Header Section -->
  <header class="header-bar d-flex align-items-center p-3">
    <div class="me-auto d-flex align-items-center">
      <h1 class="mb-0" style="font-size: 37px; font-family: 'Abhaya Libre ExtraBold', serif; font-weight: 800;">
        IELTS<br/>MASTERY
      </h1>
      <div class="divider"></div>
      <h2 class="mb-0" style="font-size: 37px; font-family: 'Abhaya Libre ExtraBold', serif; font-weight: 800;">
        LearnEnglish
      </h2>
    </div>
    <div class="d-flex align-items-center">
      <i class="bi bi-search fs-4 me-3"></i>
      <a href="#" class="text-white me-3">Login</a>
      <a href="#" class="text-white">Register</a>
    </div>
  </header>

  <!-- Navigation Links -->
  <nav class="header-bar d-flex justify-content-center py-2">
    <a href="#" class="text-white px-3">Home</a>
    <a href="#" class="text-white px-3">Exam Library</a>
    <a href="#" class="text-white px-3">Forum</a>
    <a href="#" class="text-white px-3">Tips</a>
    <a href="#" class="text-white px-3">Skills</a>
    <a href="#" class="text-white px-3">Vocabulary</a>
    <a href="#" class="text-white px-3">Book a test</a>
  </nav>

  <!-- Content Section -->
  <div class="d-flex justify-content-center align-items-center mt-5">
    <div class="container-box" style="width: 815px; height: 681px;">
      <!-- Titles -->
      <h2 class="text-center my-4" style="font-size: 40px; font-family: 'Krona One', sans-serif;">
        Your account has been recovered
      </h2>
      <p class="text-center" style="font-size: 20px; font-family: 'Alexandria', sans-serif;">
        You can log in now, or you can set a new password.
      </p>
      
      <!-- Action Buttons -->
      <div class="d-flex justify-content-around mt-5">
        <button class="btn btn-custom" style="background: #5B5D63; width: 208px;">Cancel</button>
        <button class="btn btn-custom" style="background: #84A3FF; width: 208px;">Set up</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
