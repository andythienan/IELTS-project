<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS Mastery Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #B5C8FF;
    }
    .login-container {
      background: white;
      border-radius: 25px;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    .navbar-custom {
      background-color: #7A9CFF;
      padding: 1rem;
    }
    .navbar-custom .nav-link, .navbar-custom .navbar-brand {
      color: white;
    }
    .navbar-custom .nav-link:hover {
      color: #d9d9d9;
    }
    .input-group .form-control {
      border-radius: 25px;
      background-color: #D9D9D9;
    }
    .btn-custom {
      background-color: #84A3FF;
      color: white;
      border-radius: 25px;
    }
    .btn-custom:hover {
      background-color: #6a8ce0;
    }
    .text-link {
      color: #001483;
      text-decoration: none;
    }
    .text-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">IELTS MASTERY</a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link" href="#">Home</a>
      <a class="nav-link" href="#">Exam Library</a>
      <a class="nav-link" href="#">Forum</a>
      <a class="nav-link" href="#">Tips</a>
      <a class="nav-link" href="#">Skills</a>
      <a class="nav-link" href="#">Vocabulary</a>
      <a class="nav-link" href="#">Book a test</a>
    </div>
  </div>
</nav>

<div class="d-flex align-items-center vh-100">
  <div class="login-container shadow">
    <h2 class="text-center mb-4">Log in</h2>
    <form action="/login" method="POST">
      <div class="mb-3">
        <label for="username" class="form-label">Username/Email/Phone number</label>
        <input type="text" class="form-control" id="username" name="username" placeholder="" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" name="password" placeholder="" required>
          <span class="input-group-text" id="eye-icon" onclick="togglePasswordVisibility()"><i class="bi bi-eye"></i></span>
        </div>
      </div>
      <div class="d-flex justify-content-between mb-4">
        <a href="#" class="text-link">Don’t have an account? Create one!</a>
        <a href="#" class="text-link">Can’t access your account?</a>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-custom px-4">Confirm</button>
      </div>
    </form>
    
    <script>
      // Function to toggle password visibility
      function togglePasswordVisibility() {
        var passwordInput = document.getElementById('password');
        var eyeIcon = document.getElementById('eye-icon');
        
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          eyeIcon.innerHTML = '<i class="bi bi-eye-slash"></i>'; // Change icon to eye-slash
        } else {
          passwordInput.type = 'password';
          eyeIcon.innerHTML = '<i class="bi bi-eye"></i>'; // Change icon back to eye
        }
      }
    </script>
    
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.9.1/font/bootstrap-icons.min.css"></script>
</body>
</html>
