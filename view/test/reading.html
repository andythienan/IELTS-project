<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Navigation</title>
    <link rel="stylesheet" href="reading.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <h1>Reading - Test 1</h1>
        </div>
        <div class="header-right">
            <span id="timer" class="timer">45:00</span>
        </div>        
    </header>

    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress-marker"></div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
        <!-- Left Column -->
        <div class="left-column">
            <p class="passage" id="passage">
                This is the passage content. It will update dynamically as you navigate through the questions.
            </p>
        </div>

        <!-- Right Column -->
        <div class="right-column">
            <div id="question-container">
                <!-- Question Content -->
                <h2 id="question-title">Question 1</h2>
                <p id="question-text">What is the main idea of the passage?</p>
                <div class="options" id="options-container">
                    <label class="choice-box">
                        <input type="radio" name="q1" value="A">
                        <span>A. First option</span>
                    </label>
                    <label class="choice-box">
                        <input type="radio" name="q1" value="B">
                        <span>B. Second option</span>
                    </label>
                    <label class="choice-box">
                        <input type="radio" name="q1" value="C">
                        <span>C. Third option</span>
                    </label>
                    <label class="choice-box">
                        <input type="radio" name="q1" value="D">
                        <span>D. Fourth option</span>
                    </label>
                </div>
            </div>
        </div>

        <div id="highlight-ui" class="highlight-ui">
            <div class="highlight-colors">
                <button class="color-btn" style="background-color: yellow;" data-color="yellow"></button>
                <button class="color-btn" style="background-color: #a3e635;" data-color="#a3e635"></button>
                <button class="color-btn" style="background-color: #38bdf8;" data-color="#38bdf8"></button>
                <button class="color-btn" style="background-color: #818cf8;" data-color="#818cf8"></button>
                <button class="color-btn" style="background-color: #f472b6;" data-color="#f472b6"></button>
            </div>
            <textarea class="note-input" placeholder="Add a note..."></textarea>
            <button id="save-note" class="save-note-btn">Save Note</button>
        </div>
        <div id="tooltip" class="tooltip"></div>
        
        
        
        
        
    </div>

    <!-- Footer -->
    <footer class="footer">
        <button class="btn btn-prev" id="prev-button">Previous</button>
        <button class="btn btn-next" id="next-button">Next</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
