<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Set up your account</h2>
            <button class="google-button">Sign up with Google</button>
            <p>OR SIGN UP BELOW</p>
            <form action="/register" method="post">
                <label for="first-name">First name *</label>
                <input type="text" id="first-name" name="first-name" required>
                
                <label for="last-name">Last name *</label>
                <input type="text" id="last-name" name="last-name" required>
                
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required>
                
                <label for="password">Password *</label>
                <input type="password" id="password" name="password" required>
                
                <label>
                    <input type="checkbox" name="newsletter"> Send me the OpenStax newsletter
                </label>
                <label>
                    <input type="checkbox" name="terms" required> I agree to the Terms of Use and Privacy Notice
                </label>
                
                <button type="submit" class="submit-button">Continue</button>
            </form>
            <button onclick="location.href='login.html'" class="switch-button">Log in</button>
        </div>
    </div>
</body>
</html>
