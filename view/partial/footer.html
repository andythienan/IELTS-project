<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Updated Footer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    footer {
      background-color: #0367a6;
      color: white;
      text-align: center;
      padding: 20px 0;
      margin-top: auto;
    }

    footer .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    footer .links {
      margin: 10px 0;
    }

    footer .links a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 14px;
      font-weight: bold;
    }

    footer .links a:hover {
      text-decoration: underline;
    }

    footer .copyright {
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <footer>
    <div class="logo">IELTS Mastery</div>
    <div class="links">
      <a href="#">About us</a>
      <a href="#">Accessibility</a>
      <a href="#">Complaints</a>
      <a href="#">Legal & policies</a>
      <a href="#">Sitemap</a>
    </div>
    <div class="copyright">
      © 2024. IELTS is jointly owned by the British Council, IDP IELTS, and Cambridge University Press & Assessment.
    </div>
  </footer>
</body>
</html>
