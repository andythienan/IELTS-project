<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set up new password</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&display=swap" rel="stylesheet">
  <style>
    .container-custom {
      width: 815px;
      height: 681px;
      background: white;
      border-radius: 25px;
      padding: 20px;
    }
    .login-title {
      color: black;
      font-size: 40px;
      font-family: 'Krona One', sans-serif;
      font-weight: 400;
    }
    .button-custom {
      background: #84A3FF;
      border-radius: 25px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
      font-family: 'Krona One', sans-serif;
      font-weight: 400;
      height: 52px;
    }
    .input-box {
      background: #D9D9D9;
      border-radius: 25px;
      height: 52px;
    }
    .header {
      background: #7A9CFF;
      height: 136px;
      color: white;
      display: flex;
      align-items: center;
    }
    .header .logo {
      font-family: 'Abhaya Libre ExtraBold', sans-serif;
      font-weight: 800;
      font-size: 37px;
      letter-spacing: 1.85px;
      line-height: 25px;
      margin-left: 30px;
    }
    .header .nav-item {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 24px;
      margin: 0 15px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      IELTS<br/>MASTERY
    </div>
    <div class="nav-item">Home</div>
    <div class="nav-item">Exam Library</div>
    <div class="nav-item">Vocabulary</div>
    <div class="nav-item">Forum</div>
    <div class="nav-item">Tips</div>
    <div class="nav-item">Skills</div>
    <div class="nav-item">Book a test</div>
  </div>

  <div class="container mt-5 container-custom">
    <div class="text-center login-title mb-4">Set up new password</div>
    
    <div class="mb-3">
      <div class="input-box d-flex align-items-center">
        <label for="password" class="col-form-label ms-3" style="font-size: 20px;">Password</label>
      </div>
      <input type="password" id="password" class="form-control input-box" placeholder="Enter your password">
    </div>

    <div class="mb-3">
      <div class="input-box d-flex align-items-center">
        <label for="retype-password" class="col-form-label ms-3" style="font-size: 20px;">Retype new password</label>
      </div>
      <input type="password" id="retype-password" class="form-control input-box" placeholder="Retype your password">
    </div>

    <div class="text-center">
      <button class="button-custom">Confirm</button>
    </div>
  </div>

  <!-- Bootstrap JS and dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>
</body>
</html>
